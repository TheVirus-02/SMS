<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Batch_List</title>
</head>
<body>
<h2>Batch of {{ trainer.name }}</h2>

<ul>
    {% for b in batches %}
        <li>
            <a href="{% url 'batch_students' b.id %}">
                {{ b.time }}
            </a>
        </li>
    {% endfor %}
</ul>
</body>
</html>

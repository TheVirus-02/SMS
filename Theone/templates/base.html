<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        /* NAVBAR */
        .navbar {
            background: #333;
            padding: 15px;
        }

        .navbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: yellow;
        }

        /* CONTENT */
        .container {
            padding: 20px;
        }
    </style>
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <div class="navbar">
        <a href="{% url 'index' %}">Home Page</a>
        <a href="{% url 'student_registration' %}">Student Registration</a>

        <a href="{% url 'record' %}">Records</a>

        <a href="{% url 'attendance_batches' %}">Attendance</a>


        <!-- 🔥 SHOW ONLY IN STUDENT DETAIL -->
    {% if show_student_nav %}

    <a href="{% url 'update_student' student.id %}">Update</a>

    <a href="{% url 'add_installment' student.id %}">Installment</a>

    {% endif %}
    <a href="{% url 'trainer_list' %}">Trainers</a>

    <a href="{% url 'logistics_dashboard' %}">Logistics</a>
    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
{% block scripts %}
{% endblock %}
</body>
</html>

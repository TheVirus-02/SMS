

<div class="form-shell">
    <div class="hero-card">
        <h2 class="css-inline-1">{{ page_title }}</h2>
        <p class="css-inline-2">Manage trainer profile, joining details, and course assignment.</p>
    </div>

    <form method="POST" class="form-card">
        {% csrf_token %}
        {% if error %}
        <div class="error-box css-inline-3">
            {% for item in error %}
            <div>{{ item }}</div>
            {% endfor %}
        </div>
        {% endif %}
        <div class="form-grid">
            <div class="field-group">
                <label for="name">Trainer Name</label>
                <input id="name" type="text" name="name" value="{{ form_data.name|default:trainer.name|default:'' }}" required>
            </div>
            <div class="field-group">
                <label for="mobile">Mobile Number</label>
                <input id="mobile" type="text" name="mobile" value="{{ form_data.mobile|default:trainer.mobile|default:'' }}" required>
            </div>
            <div class="field-group">
                <label for="user">Login User</label>
                <select id="user" name="user">
                    <option value="">No login linked</option>
                    {% for user in users %}
                    <option value="{{ user.id }}" {% if trainer.user_id == user.id or form_data.user_id == user.id|stringformat:"s" %}selected{% endif %}>{{ user.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="field-group">
                <label for="login_username">New Login Username</label>
                <input id="login_username" type="text" name="login_username" value="{{ form_data.login_username|default:'' }}" placeholder="{% if trainer %}Linked login username{% else %}Create login from website{% endif %}">
            </div>
            <div class="field-group">
                <label for="login_password">{% if trainer %}Change Password{% else %}New Password{% endif %}</label>
                <input id="login_password" type="text" name="login_password" value="" placeholder="{% if trainer %}Leave blank to keep current password{% else %}Set password for new or linked login{% endif %}">
            </div>
            <div class="field-group">
                <label for="age">Age</label>
                <input id="age" type="number" name="age" value="{{ form_data.age|default:trainer.age|default:'' }}">
            </div>
            <div class="field-group">
                <label for="dob">Date of Birth</label>
                <input id="dob" type="date" name="dob" value="{{ form_data.dob|default:trainer.dob|date:'Y-m-d' }}">
            </div>
            <div class="field-group">
                <label for="joining_date">Joining Date</label>
                <input id="joining_date" type="date" name="joining_date" value="{{ form_data.joining_date|default:trainer.joining_date|date:'Y-m-d' }}">
            </div>
            <div class="field-group full">
                <label>Courses</label>
                <div class="course-grid">
                    {% for course in courses %}
                    <label class="course-option">
                        <input type="checkbox" name="courses" value="{{ course.id }}" {% if trainer and course in trainer.courses.all %}checked{% endif %}>
                        <span>{{ course.name }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="action-row">
            <button class="btn" type="submit">{{ submit_label }}</button>
            {% if back_id %}
            <a class="secondary-link" href="{% url back_url_name back_id %}">Back</a>
            {% else %}
            <a class="secondary-link" href="{% url back_url_name %}">Back</a>
            {% endif %}
        </div>
    </form>
</div>
